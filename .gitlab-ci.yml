stages:
  - build
  - deploy

# Build & push the CI image, then publish the site.
#
# docker-build: builds the Dockerfile at repo root, pushes both
#   :latest (so the next docker-build can use it as --cache-from)
#   and :$CI_COMMIT_SHORT_SHA (so `pages` job this pipeline uses a known-good
#   image even if a concurrent update mutated `latest`).
#
# pages: runs `bb build` then `bb validate-links` (per AGENTS.md), uploads
#   `public/` as a Pages artifact. Image SHA-pinned to avoid pulling a
#   half-published `latest` if another pipeline run is in flight.

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_BUILDKIT: "1"

docker-build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --pull
        --cache-from "$CI_REGISTRY_IMAGE:latest"
        --build-arg BUILDKIT_INLINE_CACHE=1
        -t "$CI_REGISTRY_IMAGE:latest"
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
        .
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

pages:
  stage: deploy
  image: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  needs:
    - job: docker-build
      artifacts: false
  script:
    - bb build
    - bb validate-links
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
