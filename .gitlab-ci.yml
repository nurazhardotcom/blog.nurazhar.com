stages:
  - deploy

# pages: build the static site on a self-hosted runner and publish to
# GitLab Pages.
#
# A self-hosted runner is exempt from GitLab.com's 400-min compute quota —
# that quota only applies to GitLab-managed shared runners. The runner
# here is `shell` executor with `bb`, `pandoc`, `d2`, `make`, and docker
# (for any future docker-executor migration) installed natively; no
# Docker-in-Docker image pull is needed.
#
# Tag `homepage-self-hosted` matches the registered runner's tag-list,
# so GitLab routes the build straight to this box and shared runners
# never see the job. See `local-gitlab-runner-unlimited-ci.md` for the
# architectural write-up.

pages:
  stage: deploy
  tags:
    - homepage-self-hosted
  script:
    - bb build
    - bb validate-links
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
